<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Body Object Detection Camera</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, Helvetica, sans-serif;
    }

    video {
      position: fixed;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: black;
    }

    #startButton {
      position: fixed;
      z-index: 10;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 24px;
      font-size: 18px;
      border: 1px solid #15994e;
      background: rgba(0, 0, 0, 0.9);
      color: #15994e;
      border-radius: 999px;
      letter-spacing: 0.04em;
    }

    #status {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 5;
      color: #15994e;
      font-size: 12px;
      opacity: 0.9;
      letter-spacing: 0.04em;
      background: rgba(0, 0, 0, 0.55);
      padding: 8px 10px;
      border: 1px solid rgba(21, 153, 78, 0.45);
      border-radius: 999px;
    }

    #info {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 5;
      color: #15994e;
      font-size: 12px;
      opacity: 0.75;
      letter-spacing: 0.04em;
    }

    #controls {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      display: none;
      gap: 10px;
      align-items: center;
    }

    #controls button {
      padding: 10px 14px;
      font-size: 13px;
      border: 1px solid #15994e;
      background: rgba(0, 0, 0, 0.78);
      color: #15994e;
      border-radius: 999px;
      letter-spacing: 0.03em;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    #controls button:active {
      transform: scale(0.97);
    }

    #controls button.recording {
      background: rgba(21, 153, 78, 0.28);
      box-shadow: 0 0 16px rgba(21, 153, 78, 0.35);
    }

    #flash {
      position: fixed;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      background: white;
      opacity: 0;
      transition: opacity 160ms ease;
    }
  </style>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#15994e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Line Camera" />
</head>

<body>
  <button id="startButton">Start Camera</button>
  <div id="status">waiting</div>
  <div id="info">real image / objects / face / hands / body</div>
  <div id="controls">
    <button id="photoButton">Take Photo</button>
    <button id="recordButton">Start Recording</button>
  </div>
  <div id="flash"></div>


  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <script src="./libs/tf.min.js"></script>
  <script src="./libs/coco-ssd.min.js"></script>

  <script type="module">
    import {
      FaceLandmarker,
      FilesetResolver,
      PoseLandmarker,
      HandLandmarker
    } from "./libs/tasks-vision/vision_bundle.mjs";

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const startButton = document.getElementById("startButton");
    const statusText = document.getElementById("status");
    const controls = document.getElementById("controls");
    const photoButton = document.getElementById("photoButton");
    const recordButton = document.getElementById("recordButton");
    const flash = document.getElementById("flash");

    let model;
    let faceLandmarker;
    let poseLandmarker;
    let handLandmarker;

    let lastPredictions = [];
    let lastFaceResults = null;
    let lastPoseResults = null;
    let lastHandResults = null;

    let frameCount = 0;
    let detectingObjects = false;
    let detectingFace = false;
    let detectingPose = false;
    let detectingHands = false;
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;

    const GREEN = "#15994e";

    // Object detection:
    // Lower threshold = more objects, but more false detections.
    // 0.10 is sensitive; 0.16 is cleaner; 0.22 is strict.
    const OBJECT_SCORE_THRESHOLD = 0.10;
    const MAX_OBJECTS = 100;

    // Body/hand/face landmarks are handled by MediaPipe, separate from object detection.
    const POSE_SCORE_THRESHOLD = 0.40;
    const HAND_SCORE_THRESHOLD = 0.35;

    const labelMap = {
      "person": "person",
      "cell phone": "phone",
      "laptop": "laptop",
      "book": "book",
      "chair": "chair",
      "bottle": "bottle",
      "cup": "cup",
      "dog": "dog",
      "cat": "cat",
      "bird": "bird",
      "car": "car",
      "backpack": "backpack",
      "handbag": "bag",
      "clock": "clock",
      "tv": "screen",
      "keyboard": "keyboard",
      "mouse": "mouse",
      "remote": "remote",
      "scissors": "scissors",
      "teddy bear": "figure",
      "vase": "vase",
      "potted plant": "plant",
      "dining table": "table",
      "bed": "bed",
      "couch": "couch",
      "sink": "sink",
      "refrigerator": "fridge",
      "oven": "oven",
      "toaster": "toaster",
      "microwave": "microwave"
    };

    const FACE_PARTS = {
      faceOval: [
        10, 338, 297, 332, 284, 251, 389, 356, 454, 323,
        361, 288, 397, 365, 379, 378, 400, 377, 152, 148,
        176, 149, 150, 136, 172, 58, 132, 93, 234, 127,
        162, 21, 54, 103, 67, 109, 10
      ],
      leftEye: [33, 160, 158, 133, 153, 144, 33],
      rightEye: [362, 385, 387, 263, 373, 380, 362],
      leftIris: [468, 469, 470, 471, 472, 468],
      rightIris: [473, 474, 475, 476, 477, 473],
      leftBrow: [70, 63, 105, 66, 107],
      rightBrow: [336, 296, 334, 293, 300],
      lipsOuter: [
        61, 146, 91, 181, 84, 17, 314, 405, 321, 375,
        291, 308, 324, 318, 402, 317, 14, 87, 178, 88,
        95, 61
      ],
      lipsInner: [
        78, 191, 80, 81, 82, 13, 312, 311, 310, 415,
        308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 78
      ],
      nose: [168, 6, 197, 195, 5, 4, 1]
    };

    const POSE_CONNECTIONS = [
      [11, 12],
      [11, 13], [13, 15],
      [12, 14], [14, 16],
      [11, 23], [12, 24],
      [23, 24],
      [23, 25], [25, 27], [27, 29], [29, 31],
      [24, 26], [26, 28], [28, 30], [30, 32],
      [15, 17], [15, 19], [15, 21],
      [16, 18], [16, 20], [16, 22]
    ];

    const POSE_LABELS = {
      0: "head",
      11: "left shoulder",
      12: "right shoulder",
      13: "left elbow",
      14: "right elbow",
      15: "left wrist",
      16: "right wrist",
      23: "left hip",
      24: "right hip",
      25: "left knee",
      26: "right knee",
      27: "left ankle",
      28: "right ankle",
      29: "left heel",
      30: "right heel",
      31: "left foot",
      32: "right foot"
    };

    const HAND_CONNECTIONS = [
      [0, 1], [1, 2], [2, 3], [3, 4],
      [0, 5], [5, 6], [6, 7], [7, 8],
      [0, 9], [9, 10], [10, 11], [11, 12],
      [0, 13], [13, 14], [14, 15], [15, 16],
      [0, 17], [17, 18], [18, 19], [19, 20],
      [5, 9], [9, 13], [13, 17]
    ];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    async function startCamera() {
      try {
        startButton.style.display = "none";
        statusText.textContent = "loading object model";

        console.log("Loading COCO-SSD model...");
        model = await window.cocoSsd.load({
          base: "mobilenet_v2",
          modelUrl: "./models/coco-ssd/model.json"
        });
        console.log("COCO-SSD loaded:", model);

        statusText.textContent = "loading face model";
        console.log("Loading Face Landmarker...");

        const vision = await FilesetResolver.forVisionTasks(
          "./libs/tasks-vision/wasm"
        );

        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "./models/face_landmarker.task",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          numFaces: 1,
          outputFaceBlendshapes: false,
          outputFacialTransformationMatrixes: false
        });

        console.log("Face Landmarker loaded:", faceLandmarker);

        statusText.textContent = "loading body model";
        console.log("Loading Pose Landmarker...");
        try {
          poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
            baseOptions: {
              modelAssetPath: "./models/pose_landmarker.task",
              delegate: "GPU"
            },
            runningMode: "VIDEO",
            numPoses: 1,
            minPoseDetectionConfidence: POSE_SCORE_THRESHOLD,
            minPosePresenceConfidence: POSE_SCORE_THRESHOLD,
            minTrackingConfidence: POSE_SCORE_THRESHOLD,
            outputSegmentationMasks: false
          });
          console.log("Pose Landmarker loaded:", poseLandmarker);
        } catch (poseError) {
          console.warn("Pose model not loaded. Body/feet landmarks will be disabled.", poseError);
          poseLandmarker = null;
        }

        statusText.textContent = "loading hand model";
        console.log("Loading Hand Landmarker...");
        try {
          handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: {
              modelAssetPath: "./models/hand_landmarker.task",
              delegate: "GPU"
            },
            runningMode: "VIDEO",
            numHands: 2,
            minHandDetectionConfidence: HAND_SCORE_THRESHOLD,
            minHandPresenceConfidence: HAND_SCORE_THRESHOLD,
            minTrackingConfidence: HAND_SCORE_THRESHOLD
          });
          console.log("Hand Landmarker loaded:", handLandmarker);
        } catch (handError) {
          console.warn("Hand model not loaded. Hand/finger landmarks will be disabled.", handError);
          handLandmarker = null;
        }

        statusText.textContent = "starting camera";

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            frameRate: { ideal: 30 }
          },
          audio: false
        });

        video.srcObject = stream;

        video.onloadedmetadata = () => {
          video.play();
          console.log("Video size:", video.videoWidth, video.videoHeight);
          statusText.textContent = "camera active";
          controls.style.display = "flex";
          draw();
        };
      } catch (error) {
        console.error(error);

        // If GPU fails on some iPhones, try CPU for face landmarks.
        if (String(error).includes("GPU") || String(error).includes("delegate")) {
          statusText.textContent = "face GPU failed, trying CPU";
          try {
            const vision = await FilesetResolver.forVisionTasks("./libs/tasks-vision/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
              baseOptions: {
                modelAssetPath: "./models/face_landmarker.task",
                delegate: "CPU"
              },
              runningMode: "VIDEO",
              numFaces: 1,
              outputFaceBlendshapes: false,
              outputFacialTransformationMatrixes: false
            });
            statusText.textContent = "reload and start again";
          } catch (cpuError) {
            console.error(cpuError);
            statusText.textContent = "face model error";
          }
        } else {
          statusText.textContent = "error: check files / permission";
        }

        startButton.style.display = "block";
      }
    }

    function drawRealImage() {
      ctx.globalAlpha = 1;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.globalAlpha = 1;

      // Dark overlay keeps the green detection lines visible while preserving the real camera image.
      ctx.fillStyle = "rgba(0, 0, 0, 0.22)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    async function updateObjectDetection() {
      if (!model || video.readyState !== 4 || detectingObjects) return;

      // Object detection is heavier, but this runs a bit more often for better responsiveness.
      if (frameCount % 6 !== 0) return;

      detectingObjects = true;

      try {
        const predictions = await model.detect(video, MAX_OBJECTS, OBJECT_SCORE_THRESHOLD);
        console.log("objects:", predictions);

        lastPredictions = predictions.filter(
          prediction => prediction.score > OBJECT_SCORE_THRESHOLD
        );
      } catch (error) {
        console.error("Detection error:", error);
        statusText.textContent = "object detection error";
      }

      detectingObjects = false;
    }

    async function updateFaceLandmarks() {
      if (!faceLandmarker || video.readyState !== 4 || detectingFace) return;

      // Face landmark is lighter and should feel responsive.
      if (frameCount % 2 !== 0) return;

      detectingFace = true;

      try {
        const now = performance.now();
        lastFaceResults = faceLandmarker.detectForVideo(video, now);
      } catch (error) {
        console.error("Face landmark error:", error);
      }

      detectingFace = false;
    }

    async function updatePoseLandmarks() {
      if (!poseLandmarker || video.readyState !== 4 || detectingPose) return;

      // Pose gives body structure: shoulders, elbows, wrists, hips, knees, ankles, feet.
      if (frameCount % 3 !== 0) return;

      detectingPose = true;

      try {
        const now = performance.now();
        lastPoseResults = poseLandmarker.detectForVideo(video, now);
      } catch (error) {
        console.error("Pose landmark error:", error);
      }

      detectingPose = false;
    }

    async function updateHandLandmarks() {
      if (!handLandmarker || video.readyState !== 4 || detectingHands) return;

      // Hands are detailed, so every 3 frames keeps it lighter on iPhone.
      if (frameCount % 3 !== 0) return;

      detectingHands = true;

      try {
        const now = performance.now();
        lastHandResults = handLandmarker.detectForVideo(video, now);
      } catch (error) {
        console.error("Hand landmark error:", error);
      }

      detectingHands = false;
    }

    function drawObjectDetection(prediction) {
      if (!video.videoWidth || !video.videoHeight) return;

      const scaleX = canvas.width / video.videoWidth;
      const scaleY = canvas.height / video.videoHeight;

      const [x, y, width, height] = prediction.bbox;

      const sx = x * scaleX;
      const sy = y * scaleY;
      const sw = width * scaleX;
      const sh = height * scaleY;

      const cx = sx + sw / 2;
      const cy = sy + sh / 2;

      const label = labelMap[prediction.class] || prediction.class;
      const percent = Math.round(prediction.score * 100);
      const alpha = Math.min(Math.max(prediction.score, 0.35), 0.95);

      ctx.strokeStyle = `rgba(21, 153, 78, ${alpha})`;
      ctx.lineWidth = 1.4;
      ctx.strokeRect(sx, sy, sw, sh);

      const corner = 20;
      ctx.lineWidth = 2.5;
      ctx.beginPath();

      ctx.moveTo(sx, sy + corner);
      ctx.lineTo(sx, sy);
      ctx.lineTo(sx + corner, sy);

      ctx.moveTo(sx + sw - corner, sy);
      ctx.lineTo(sx + sw, sy);
      ctx.lineTo(sx + sw, sy + corner);

      ctx.moveTo(sx + sw, sy + sh - corner);
      ctx.lineTo(sx + sw, sy + sh);
      ctx.lineTo(sx + sw - corner, sy + sh);

      ctx.moveTo(sx + corner, sy + sh);
      ctx.lineTo(sx, sy + sh);
      ctx.lineTo(sx, sy + sh - corner);
      ctx.stroke();

      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx - 9, cy);
      ctx.lineTo(cx + 9, cy);
      ctx.moveTo(cx, cy - 9);
      ctx.lineTo(cx, cy + 9);
      ctx.stroke();

      ctx.strokeStyle = "rgba(21, 153, 78, 0.22)";
      ctx.beginPath();
      ctx.moveTo(sx, cy);
      ctx.lineTo(sx + sw, cy);
      ctx.stroke();

      let extra = "";
      if (prediction.class === "person") {
        const bodyArea = Math.round((sw * sh) / (canvas.width * canvas.height) * 100);
        extra = ` / area ${bodyArea}%`;
      }

      const text = `fuck it, it's just a ${label} ${percent}%${extra}`;
      ctx.font = "14px Arial";
      const textWidth = ctx.measureText(text).width;

      ctx.fillStyle = "rgba(0, 0, 0, 0.78)";
      ctx.fillRect(sx, Math.max(sy - 29, 0), textWidth + 14, 24);

      ctx.fillStyle = "rgba(21, 153, 78, 1)";
      ctx.fillText(text, sx + 7, Math.max(sy - 12, 17));
    }

    function drawFaceLandmarks() {
      if (!lastFaceResults || !lastFaceResults.faceLandmarks) return;
      if (!video.videoWidth || !video.videoHeight) return;

      const scaleX = canvas.width / video.videoWidth;
      const scaleY = canvas.height / video.videoHeight;

      ctx.strokeStyle = "rgba(21, 153, 78, 0.96)";
      ctx.fillStyle = "rgba(21, 153, 78, 0.96)";
      ctx.lineWidth = 1.4;

      for (const landmarks of lastFaceResults.faceLandmarks) {
        drawFacePath(landmarks, FACE_PARTS.faceOval, scaleX, scaleY, true);
        drawFacePath(landmarks, FACE_PARTS.leftEye, scaleX, scaleY, true);
        drawFacePath(landmarks, FACE_PARTS.rightEye, scaleX, scaleY, true);

        if (landmarks.length > 477) {
          drawFacePath(landmarks, FACE_PARTS.leftIris, scaleX, scaleY, true);
          drawFacePath(landmarks, FACE_PARTS.rightIris, scaleX, scaleY, true);
        }

        drawFacePath(landmarks, FACE_PARTS.leftBrow, scaleX, scaleY, false);
        drawFacePath(landmarks, FACE_PARTS.rightBrow, scaleX, scaleY, false);
        drawFacePath(landmarks, FACE_PARTS.lipsOuter, scaleX, scaleY, true);
        drawFacePath(landmarks, FACE_PARTS.lipsInner, scaleX, scaleY, true);
        drawFacePath(landmarks, FACE_PARTS.nose, scaleX, scaleY, false);

        drawSmallPoints(landmarks, [1, 4, 13, 14, 33, 133, 263, 362], scaleX, scaleY);
        drawFaceLabel(landmarks, scaleX, scaleY);
      }
    }

    function drawFacePath(landmarks, indices, scaleX, scaleY, closePath) {
      ctx.beginPath();

      indices.forEach((index, i) => {
        const point = landmarks[index];
        if (!point) return;

        const x = point.x * video.videoWidth * scaleX;
        const y = point.y * video.videoHeight * scaleY;

        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      });

      if (closePath) ctx.closePath();
      ctx.stroke();
    }

    function drawSmallPoints(landmarks, indices, scaleX, scaleY) {
      for (const index of indices) {
        const point = landmarks[index];
        if (!point) continue;

        const x = point.x * video.videoWidth * scaleX;
        const y = point.y * video.videoHeight * scaleY;

        ctx.beginPath();
        ctx.arc(x, y, 2.2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawFaceLabel(landmarks, scaleX, scaleY) {
      const nose = landmarks[1];
      if (!nose) return;

      const x = nose.x * video.videoWidth * scaleX;
      const y = nose.y * video.videoHeight * scaleY;
      const text = "fuck it, it\'s just a face / eyes / lips";

      ctx.font = "13px Arial";
      const textWidth = ctx.measureText(text).width;

      ctx.fillStyle = "rgba(0, 0, 0, 0.72)";
      ctx.fillRect(x + 10, y - 22, textWidth + 14, 22);

      ctx.fillStyle = "rgba(21, 153, 78, 1)";
      ctx.fillText(text, x + 17, y - 6);
    }

    function landmarkToCanvas(point, scaleX, scaleY) {
      return {
        x: point.x * video.videoWidth * scaleX,
        y: point.y * video.videoHeight * scaleY
      };
    }

    function drawPoseLandmarks() {
      if (!lastPoseResults || !lastPoseResults.landmarks) return;
      if (!video.videoWidth || !video.videoHeight) return;

      const scaleX = canvas.width / video.videoWidth;
      const scaleY = canvas.height / video.videoHeight;

      ctx.strokeStyle = "rgba(21, 153, 78, 0.98)";
      ctx.fillStyle = "rgba(21, 153, 78, 0.98)";

      for (const landmarks of lastPoseResults.landmarks) {
        ctx.lineWidth = 2.2;

        for (const [a, b] of POSE_CONNECTIONS) {
          const pa = landmarks[a];
          const pb = landmarks[b];
          if (!pa || !pb) continue;
          if ((pa.visibility ?? 1) < 0.35 || (pb.visibility ?? 1) < 0.35) continue;

          const ca = landmarkToCanvas(pa, scaleX, scaleY);
          const cb = landmarkToCanvas(pb, scaleX, scaleY);

          ctx.beginPath();
          ctx.moveTo(ca.x, ca.y);
          ctx.lineTo(cb.x, cb.y);
          ctx.stroke();
        }

        for (const index of Object.keys(POSE_LABELS)) {
          const point = landmarks[index];
          if (!point || (point.visibility ?? 1) < 0.35) continue;

          const p = landmarkToCanvas(point, scaleX, scaleY);

          ctx.beginPath();
          ctx.arc(p.x, p.y, 3.4, 0, Math.PI * 2);
          ctx.fill();

          if ([15, 16, 27, 28, 31, 32].includes(Number(index))) {
            drawSmallTag(`fuck it, it\'s just a ${POSE_LABELS[index]}`, p.x + 8, p.y - 8);
          }
        }

        drawBodyScaleLabel(landmarks, scaleX, scaleY);
      }
    }

    function drawBodyScaleLabel(landmarks, scaleX, scaleY) {
      const head = landmarks[0];
      const leftFoot = landmarks[31];
      const rightFoot = landmarks[32];

      if (!head || (!leftFoot && !rightFoot)) return;

      const feet = [leftFoot, rightFoot].filter(Boolean);
      const avgFootY = feet.reduce((sum, p) => sum + p.y, 0) / feet.length;

      const headP = landmarkToCanvas(head, scaleX, scaleY);
      const footY = avgFootY * video.videoHeight * scaleY;
      const bodyPixelHeight = Math.abs(footY - headP.y);
      const framePercent = Math.round((bodyPixelHeight / canvas.height) * 100);

      drawSmallTag(`fuck it, it\'s just a body scale ${framePercent}%`, headP.x + 12, headP.y - 18);
    }

    function drawHandLandmarks() {
      if (!lastHandResults || !lastHandResults.landmarks) return;
      if (!video.videoWidth || !video.videoHeight) return;

      const scaleX = canvas.width / video.videoWidth;
      const scaleY = canvas.height / video.videoHeight;

      ctx.strokeStyle = "rgba(21, 153, 78, 0.98)";
      ctx.fillStyle = "rgba(21, 153, 78, 0.98)";
      ctx.lineWidth = 1.8;

      for (const landmarks of lastHandResults.landmarks) {
        for (const [a, b] of HAND_CONNECTIONS) {
          const pa = landmarks[a];
          const pb = landmarks[b];
          if (!pa || !pb) continue;

          const ca = landmarkToCanvas(pa, scaleX, scaleY);
          const cb = landmarkToCanvas(pb, scaleX, scaleY);

          ctx.beginPath();
          ctx.moveTo(ca.x, ca.y);
          ctx.lineTo(cb.x, cb.y);
          ctx.stroke();
        }

        for (let i = 0; i < landmarks.length; i++) {
          const point = landmarks[i];
          if (!point) continue;

          const p = landmarkToCanvas(point, scaleX, scaleY);
          ctx.beginPath();
          ctx.arc(p.x, p.y, i === 0 ? 3.4 : 2.4, 0, Math.PI * 2);
          ctx.fill();
        }

        const wrist = landmarks[0];
        if (wrist) {
          const p = landmarkToCanvas(wrist, scaleX, scaleY);
          drawSmallTag("fuck it, it\'s just a hand / fingers", p.x + 10, p.y - 12);
        }
      }
    }

    function drawSmallTag(text, x, y) {
      ctx.font = "12px Arial";
      const paddingX = 6;
      const textWidth = ctx.measureText(text).width;

      ctx.fillStyle = "rgba(0, 0, 0, 0.74)";
      ctx.fillRect(x, y - 14, textWidth + paddingX * 2, 20);

      ctx.fillStyle = "rgba(21, 153, 78, 1)";
      ctx.fillText(text, x + paddingX, y);
    }



    function flashScreen() {
      flash.style.opacity = "0.55";
      window.setTimeout(() => {
        flash.style.opacity = "0";
      }, 120);
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.rel = "noopener";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      window.setTimeout(() => {
        URL.revokeObjectURL(url);
      }, 1000);
    }

    function takePhoto() {
      if (!canvas.width || !canvas.height) {
        statusText.textContent = "photo failed";
        return;
      }

      canvas.toBlob(blob => {
        if (!blob) {
          statusText.textContent = "photo failed";
          return;
        }

        downloadBlob(blob, `line-camera-photo-${Date.now()}.png`);
        flashScreen();
        statusText.textContent = "photo saved";
      }, "image/png");
    }

    function getSupportedRecordingOptions() {
      if (typeof MediaRecorder === "undefined") return null;

      const candidates = [
        "video/mp4;codecs=h264",
        "video/mp4",
        "video/webm;codecs=vp9",
        "video/webm;codecs=vp8",
        "video/webm"
      ];

      for (const mimeType of candidates) {
        if (MediaRecorder.isTypeSupported(mimeType)) {
          return { mimeType };
        }
      }

      return {};
    }

    function startRecording() {
      if (!canvas.captureStream || typeof MediaRecorder === "undefined") {
        statusText.textContent = "recording not supported";
        return;
      }

      const options = getSupportedRecordingOptions();
      if (options === null) {
        statusText.textContent = "recording not supported";
        return;
      }

      const stream = canvas.captureStream(30);
      recordedChunks = [];

      try {
        mediaRecorder = new MediaRecorder(stream, options);
      } catch (error) {
        console.error("MediaRecorder error:", error);
        statusText.textContent = "recording failed";
        return;
      }

      mediaRecorder.ondataavailable = event => {
        if (event.data && event.data.size > 0) {
          recordedChunks.push(event.data);
        }
      };

      mediaRecorder.onstop = saveRecording;
      mediaRecorder.start(1000);

      isRecording = true;
      recordButton.textContent = "Stop Recording";
      recordButton.classList.add("recording");
      statusText.textContent = "recording";
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
      }

      isRecording = false;
      recordButton.textContent = "Start Recording";
      recordButton.classList.remove("recording");
      statusText.textContent = "saving recording";
    }

    function saveRecording() {
      if (!recordedChunks.length) {
        statusText.textContent = "no recording data";
        return;
      }

      const mimeType = mediaRecorder?.mimeType || "video/webm";
      const extension = mimeType.includes("mp4") ? "mp4" : "webm";
      const blob = new Blob(recordedChunks, { type: mimeType });

      downloadBlob(blob, `line-camera-recording-${Date.now()}.${extension}`);
      statusText.textContent = "recording saved";
    }

    async function draw() {
      frameCount++;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (video.readyState === 4 && video.videoWidth > 0) {
        drawRealImage();

        await updateObjectDetection();
        await updateFaceLandmarks();
        await updatePoseLandmarks();
        await updateHandLandmarks();

        lastPredictions.forEach(prediction => {
          drawObjectDetection(prediction);
        });

        drawPoseLandmarks();
        drawHandLandmarks();
        drawFaceLandmarks();

        const faceCount = lastFaceResults?.faceLandmarks?.length || 0;
        const poseCount = lastPoseResults?.landmarks?.length || 0;
        const handCount = lastHandResults?.landmarks?.length || 0;
        statusText.textContent = `objects: ${lastPredictions.length} / faces: ${faceCount} / bodies: ${poseCount} / hands: ${handCount}`;
      }

      requestAnimationFrame(draw);
    }

    startButton.addEventListener("click", startCamera);
    photoButton.addEventListener("click", takePhoto);
    recordButton.addEventListener("click", () => {
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    });
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("./service-worker.js")
          .then(() => console.log("Service Worker registered"))
          .catch(error => console.log("Service Worker error:", error));
      });
    }
  </script>
</body>
</html>
