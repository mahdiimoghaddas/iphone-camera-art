<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abstract Object Camera</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    video {
      display: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: black;
    }

    #startButton {
      position: fixed;
      z-index: 10;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 24px;
      font-size: 18px;
      border: 1px solid #15994e;
      background: black;
      color: #15994e;
      border-radius: 999px;
    }
  </style>
</head>

<body>
  <button id="startButton">Start Camera</button>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

  <!-- COCO-SSD object detection model -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const startButton = document.getElementById("startButton");

    let model;
    let trails = [];

    const poeticLabels = {
      "person": "body",
      "cell phone": "signal",
      "laptop": "machine",
      "book": "memory",
      "chair": "waiting object",
      "bottle": "container",
      "cup": "ritual",
      "dog": "living presence",
      "cat": "living presence",
      "bird": "living presence",
      "car": "movement",
      "backpack": "carried life",
      "handbag": "carried object",
      "clock": "time",
      "tv": "screen",
      "keyboard": "language machine",
      "mouse": "small machine"
    };

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    async function startCamera() {
      startButton.style.display = "none";

      model = await cocoSsd.load();

      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "environment"
        },
        audio: false
      });

      video.srcObject = stream;

      video.onloadedmetadata = () => {
        video.play();
        draw();
      };
    }

    function drawAbstractObject(prediction, scaleX, scaleY) {
      const [x, y, width, height] = prediction.bbox;

      const sx = x * scaleX;
      const sy = y * scaleY;
      const sw = width * scaleX;
      const sh = height * scaleY;

      const cx = sx + sw / 2;
      const cy = sy + sh / 2;

      const label = poeticLabels[prediction.class] || prediction.class;

      trails.push({
        x: cx,
        y: cy,
        label: label,
        life: 1
      });

      ctx.strokeStyle = "rgba(21, 153, 78, 0.8)";
      ctx.lineWidth = 1;

      // abstract rectangle
      ctx.strokeRect(sx, sy, sw, sh);

      // center point
      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
      ctx.fill();

      // glitch lines
      for (let i = 0; i < 8; i++) {
        const dx1 = (Math.random() - 0.5) * 80;
        const dy1 = (Math.random() - 0.5) * 80;
        const dx2 = (Math.random() - 0.5) * 80;
        const dy2 = (Math.random() - 0.5) * 80;

        ctx.beginPath();
        ctx.moveTo(cx + dx1, cy + dy1);
        ctx.lineTo(cx + dx2, cy + dy2);
        ctx.stroke();
      }

      // label
      ctx.font = "18px Arial";
      ctx.fillStyle = "rgba(21, 153, 78, 0.95)";
      ctx.fillText(label, sx, Math.max(sy - 10, 20));
    }

    function drawTrails() {
      for (let i = trails.length - 1; i >= 0; i--) {
        const t = trails[i];

        ctx.globalAlpha = t.life;
        ctx.fillStyle = "rgba(21, 153, 78, 0.4)";
        ctx.beginPath();
        ctx.arc(t.x, t.y, 20 * (1 - t.life + 0.2), 0, Math.PI * 2);
        ctx.stroke();

        ctx.font = "12px Arial";
        ctx.fillText(t.label, t.x + 10, t.y + 10);

        t.life -= 0.01;

        if (t.life <= 0) {
          trails.splice(i, 1);
        }
      }

      ctx.globalAlpha = 1;
    }

    async function draw() {
      // fade effect instead of clearing completely
      ctx.fillStyle = "rgba(0, 0, 0, 0.12)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (model && video.readyState === 4) {
        const predictions = await model.detect(video);

        const scaleX = canvas.width / video.videoWidth;
        const scaleY = canvas.height / video.videoHeight;

        predictions.forEach(prediction => {
          if (prediction.score > 0.45) {
            drawAbstractObject(prediction, scaleX, scaleY);
          }
        });
      }

      drawTrails();

      requestAnimationFrame(draw);
    }

    startButton.addEventListener("click", startCamera);
  </script>
</body>
</html>
